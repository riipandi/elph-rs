[workspace]
resolver = "2"
members = ["crates/agent", "crates/ai", "crates/tui", "eclaw", "elph"]

[workspace.dependencies]
# Planned — not yet wired into crates:
# agent-client-protocol = "1.0.1"
# fff-search = "0.9.6"
# rmcp = { version = "2.1.0", features = ["auth", "client"] }
anyhow = "1.0.103"
elph-ai = { path = "crates/ai", version = "0.0.12" }
elph-agent = { path = "crates/agent", version = "0.0.12" }
elph-tui = { path = "crates/tui", version = "0.0.12" }
axum = { version = "0.8.8", default-features = false, features = ["http1", "json", "matched-path", "tokio"] }
clap = { version = "4.5", default-features = false, features = [
  "color",
  "derive",
  "error-context",
  "help",
  "std",
  "usage",
] }
crokey = "1.4.0"
crossterm = { version = "0.29", default-features = false, features = ["bracketed-paste", "events"] }
libc = "0.2"
cuid2 = "0.1.6"
indicatif = { version = "0.18.6", default-features = false, features = ["unicode-width"] }
iocraft = "0.8.3"
pulldown-cmark = { version = "0.13", default-features = false, features = ["simd"] }
similar = { version = "3.1.1", features = ["inline", "unicode"] }
serde = { version = "1.0.228", default-features = false, features = ["derive", "std"] }
serde_json = { version = "1.0.150", default-features = false, features = ["std"] }
thiserror = { version = "2.0.18", default-features = false }
tokio = { version = "1", default-features = false, features = ["macros", "rt"] }
tower-http = { version = "0.7.0", default-features = false, features = ["catch-panic", "trace"] }
turso = { version = "0.6.1", default-features = false }

[profile.release]
opt-level = 2 # Optimization level: 2 = balanced runtime perf vs compile time
lto = "thin" # Thin LTO: cross-crate inlining without full-program analysis cost
codegen-units = 16 # Parallel codegen: 16 units = faster compile, minimal optimization loss
panic = "abort" # panic=abort: removes unwind tables — smaller binary, cannot catch panics
strip = "symbols" # Strip all symbols from final binary
debug = false # No debug symbols in release

[profile.dev]
incremental = true # Incremental: rebuild only changed code — much faster iteration
debug = "limited" # Limited debug info: line numbers only, no type/variable debug
