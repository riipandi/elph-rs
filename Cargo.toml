[workspace]
resolver = "2"
members = [
    "crates/agent",
    "crates/ai",
    "crates/tui",
    "eclaw",
    "elph",
]

[workspace.dependencies]
agent-client-protocol = "1.0.1"
axum = "0.8.8"
chrono = { version = "0.4.45", default-features = false, features = ["clock", "std"] }
clap = { version = "4.5", features = ["derive"] }
colored = "3.1.1"
crokey = "1.4.0"
crossbeam = { version = "0.8.4", default-features = false, features = ["std", "crossbeam-channel"] }
crossterm = "0.29"
cuid2 = "0.1.6"
fff-search = "0.9.6"
indicatif = "0.18.6"
iocraft = "0.8.3"
nix = { version = "0.31", default-features = false, features = ["signal", "process"] }
rmcp = { version = "2.1.0", features = ["auth", "client"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
signal-hook = "0.4.4"
thiserror = "2.0.18"
tokio = { version = "1", features = ["rt-multi-thread", "rt", "sync", "macros", "time", "net", "signal"] }
tower-http = { version = "0.7.0", features = ["catch-panic", "fs", "trace"] }
turso = "0.6.1"

[profile.release]
opt-level = 2        # Optimization level: 2 = balanced runtime perf vs compile time
lto = "thin"         # Thin LTO: cross-crate inlining without full-program analysis cost
codegen-units = 16   # Parallel codegen: 16 units = faster compile, minimal optimization loss
panic = "abort"      # panic=abort: removes unwind tables — smaller binary, cannot catch panics
strip = "symbols"    # Strip all symbols from final binary
debug = false        # No debug symbols in release

[profile.dev]
incremental = true   # Incremental: rebuild only changed code — much faster iteration
debug = "limited"    # Limited debug info: line numbers only, no type/variable debug
