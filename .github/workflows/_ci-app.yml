# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI App

on:
  workflow_call:
    inputs:
      app:
        description: Application to test (elph, eclaw, or owly)
        required: true
        type: string
      sharedKeyPrefix:
        description: Cache key prefix
        required: false
        type: string
        default: ci
      skipVersionGate:
        description: Skip version gate (caller already checked)
        required: false
        type: boolean
        default: false
    outputs:
      should_continue:
        description: Whether the version gate allowed the pipeline to continue
        value: ${{ inputs.skipVersionGate == true && 'true' || jobs.version-gate.outputs.should_continue }}

permissions:
  contents: read

env:
  CI: true

jobs:
  version-gate:
    if: ${{ !inputs.skipVersionGate }}
    uses: ./.github/workflows/_version-gate.yml
    with:
      app: ${{ inputs.app }}

  quality:
    name: ${{ inputs.app }} (${{ matrix.os }})
    needs: version-gate
    if: |
      inputs.skipVersionGate ||
      needs.version-gate.outputs.should_continue == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/setup-rust
        with:
          sharedKey: ${{ inputs.sharedKeyPrefix }}-${{ inputs.app }}-${{ matrix.os }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check compilation
        run: make check-${{ inputs.app }}

      - name: Lint
        run: make lint-${{ inputs.app }}

      - name: Test
        run: make test-${{ inputs.app }}

      - name: Build release binary
        run: make build-${{ inputs.app }}

      - name: Show sccache statistics
        if: always()
        uses: ./.github/show-sccache-stats
