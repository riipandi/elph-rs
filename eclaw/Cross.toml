# Cross-compilation config for eclaw.
# Linux desktop: Ubuntu/Raspberry Pi OS 64-bit (glibc), Alpine (musl).
# armv7 (Pi 3 32-bit) unsupported — turso/io-uring lacks armv7 bindings.
# Artifacts staged to release/binaries/ and release/archives/.
# Windows: optional. macOS: `make cross-darwin PKG=eclaw` (native).
#
# Usage:
#   cross build --release -p eclaw --target x86_64-unknown-linux-gnu
#   make cross CROSS_TARGET=x86_64-unknown-linux-musl

[build]
default-target = "x86_64-unknown-linux-gnu"
# Default image: ghcr.io/cross-rs/<target>:latest
# Pre-pull all: make cross-pull  (or: docker pull ghcr.io/cross-rs/<target>:latest)

[build.env]
passthrough = ["RUSTFLAGS", "RUST_BACKTRACE", "CARGO_NET_GIT_FETCH_WITH_CLI"]

# ─── Linux (glibc) ───────────────────────────────────────────────────────────

[target.x86_64-unknown-linux-gnu]
image = ":latest"
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update",
  "apt-get install --assume-yes pkg-config libzstd-dev:$CROSS_DEB_ARCH",
]

[target.aarch64-unknown-linux-gnu]
image = ":latest"
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update",
  "apt-get install --assume-yes pkg-config libzstd-dev:$CROSS_DEB_ARCH",
]

# ─── Linux (musl / Alpine) ───────────────────────────────────────────────────

[target.x86_64-unknown-linux-musl]
image = ":latest"
pre-build = ["apk add --no-cache musl-dev pkgconfig zstd-dev"]

[target.aarch64-unknown-linux-musl]
image = ":latest"
pre-build = ["apk add --no-cache musl-dev pkgconfig zstd-dev"]

# ─── Windows ─────────────────────────────────────────────────────────────────

[target.x86_64-pc-windows-gnu]
image = ":latest"

# MSVC targets have no pre-built ghcr.io images (see cross-rs README).
[target.x86_64-pc-windows-msvc]

[target.aarch64-pc-windows-msvc]
