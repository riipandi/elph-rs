[package]
name = "eclaw"
version = "0.0.8"
license = "MIT"
description = "Personal AI assistant powered by Elph"
homepage = "https://elph.space"
repository = "https://github.com/riipandi/elph"
keywords = ["ai", "assistant", "cli", "elph", "personal"]
categories = ["command-line-utilities", "development-tools"]
authors = ["Aris Ripandi <aris@duck.com>"]
rust-version = "1.96"
edition = "2024"
publish = true

[[bin]]
name = "eclaw"
path = "src/main.rs"

[dependencies]
clap.workspace = true
elph-agent = { path = "../crates/agent", version = "0.0.8" }
