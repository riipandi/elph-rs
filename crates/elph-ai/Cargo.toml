[package]
name = "elph-ai"
version = "0.0.20"
license = "MIT"
description = "Unified LLM API with provider collections, auth resolution, and streaming"
keywords = ["ai", "llm", "provider", "api", "elph"]
categories = ["api-bindings", "development-tools"]
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
edition.workspace = true
publish = true

[lib]
name = "elph_ai"
path = "src/lib.rs"

[dependencies]
anyhow.workspace = true
async-trait = "0.1"
aws-config = "1"
aws-sdk-bedrockruntime = "1"
aws-smithy-runtime-api = "1"
aws-smithy-types = "1"
axum = { workspace = true, features = ["query"] }
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
eventsource-stream = "0.2"
futures = "0.3"
futures-util = "0.3"
http = "1"
jsonschema = "0.46.10"
lazy_static = "1.5"
once_cell = "1.21"
rand = "0.10.2"
regex = "1"
reqwest = { version = "0.13.4", default-features = false, features = ["json", "rustls", "stream"] }
schemars = "1.2.1"
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha2 = "0.11.0"
thiserror = "2"
tokio = { workspace = true, features = ["sync", "time", "rt-multi-thread", "macros", "net", "io-util"] }
tokio-tungstenite = { version = "0.29.0", default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
tokio-util = "0.7"
tracing = { workspace = true }
url = "2"
zstd = "0.13"

[[example]]
name = "opencode_big_pickle"
path = "examples/opencode_big_pickle.rs"

[dev-dependencies]
indicatif.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
