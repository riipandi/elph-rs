[package]
name = "elph-tui"
version = "0.0.26"
license = "MIT"
description = "Terminal UI components for Elph agent"
keywords = ["tui", "terminal", "prompt", "tuie", "elph"]
categories = ["command-line-utilities", "gui"]
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
edition.workspace = true
publish = true

[lib]
name = "elph_tui"
path = "src/lib.rs"

[dependencies]
anyhow.workspace = true
base64.workspace = true
chord_macro = "0.1"
futures.workspace = true
chrono.workspace = true
crossterm.workspace = true
elph-core = { workspace = true, features = ["git"] }
memchr.workspace = true
parking_lot.workspace = true
pulldown-cmark.workspace = true
rayon.workspace = true
similar.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "signal", "sync", "time"] }
tuie = { version = "0.2", features = ["harmonious"] }
unicode-segmentation.workspace = true
unicode-width.workspace = true

[dev-dependencies]
futures.workspace = true
similar-asserts.workspace = true
tokio = { workspace = true, features = ["macros"] }

[target.'cfg(unix)'.dev-dependencies]
libc.workspace = true

[lints.rust]
linker_messages = "allow"
