[package]
name = "elph-tui"
version = "0.0.17"
license = "MIT"
description = "Terminal UI components for Elph agent"
keywords = ["tui", "terminal", "prompt", "iocraft", "elph"]
categories = ["command-line-utilities", "gui"]
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
edition.workspace = true
publish = true

[lib]
name = "elph_tui"
path = "src/lib.rs"

[dependencies]
anyhow.workspace = true
crokey.workspace = true
crossterm.workspace = true
iocraft.workspace = true
pulldown-cmark.workspace = true
similar.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "signal", "sync", "time"] }
unicode-width = "0.2"

[dev-dependencies]
futures = "0.3"
similar-asserts = "2.0.0"
tokio = { workspace = true, features = ["macros"] }

[target.'cfg(unix)'.dev-dependencies]
libc.workspace = true
