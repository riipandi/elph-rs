[package]
name = "elph-tui"
version = "0.0.26"
license = "MIT"
description = "Terminal UI components for Elph agent"
keywords = ["tui", "terminal", "prompt", "tuie", "elph"]
categories = ["command-line-utilities", "gui"]
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
edition.workspace = true
publish = false

[lib]
name = "elph_tui"
path = "src/lib.rs"

