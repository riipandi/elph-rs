[package]
name = "elph"
version = "0.0.12"
license = "MIT"
description = "Minimalist AI agent companion for coding"
homepage = "https://elph.space"
repository = "https://github.com/riipandi/elph"
keywords = ["ai", "agent", "cli", "coding", "llm"]
categories = ["command-line-utilities", "development-tools"]
rust-version = "1.96"
edition = "2024"
publish = true

[[bin]]
name = "elph"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
clap.workspace = true
cuid2.workspace = true
elph-agent.workspace = true
elph-tui.workspace = true
iocraft.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["net", "time"] }

[target.'cfg(unix)'.dependencies]
libc.workspace = true

[dev-dependencies]
tempfile = "3.27.0"
